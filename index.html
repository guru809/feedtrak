<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Tracker</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f5f7fa;
            --text: #333;
            --white: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        /* Top Summary Bar */
        .summary-bar {
            background: var(--white);
            padding: 15px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .summary-item { text-align: center; }
        .summary-item label { font-size: 0.75rem; color: #666; display: block; }
        .summary-item span { font-weight: bold; font-size: 1.1rem; color: var(--primary); }

        /* Date Navigation */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        button {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        button:active { opacity: 0.8; }

        /* Grid Styling */
        .grid-container {
            background: var(--white);
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th {
            background: #f8f9fb;
            text-align: left;
            padding: 12px;
            font-size: 0.85rem;
            border-bottom: 2px solid #eee;
        }
        td {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }
        input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .count-cell {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .count-btn {
            padding: 2px 8px;
            background: #eee;
            color: #333;
            font-size: 1.2rem;
            border-radius: 4px;
        }
        .count-input { width: 40px; text-align: center; }

        .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .export-btn { background: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <button onclick="changeDate(-1)">← Prev</button>
        <h3 id="currentDateDisplay"></h3>
        <button onclick="changeDate(1)">Next →</button>
    </div>

    <div class="summary-bar">
        <div class="summary-item"><label>Formula</label><span id="totalFormula">0</span><small>ml</small></div>
        <div class="summary-item"><label>Urine</label><span id="totalUrine">0</span></div>
        <div class="summary-item"><label>Vomit</label><span id="totalVomit">0</span></div>
        <div class="summary-item"><label>Stool</label><span id="totalStool">0</span></div>
    </div>

    <div class="grid-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%">Time</th>
                    <th style="width: 20%">Breast</th>
                    <th style="width: 15%">Formula</th>
                    <th style="width: 16%">Urine</th>
                    <th style="width: 16%">Vomit</th>
                    <th style="width: 16%">Stool</th>
                </tr>
            </thead>
            <tbody id="gridBody"></tbody>
        </table>
    </div>

    <div class="actions">
        <button onclick="addRow()">+ Add Entry</button>
        <button class="export-btn" onclick="exportCSV()">Export Day to CSV</button>
    </div>
</div>

<script>
    let currentDate = new Date().toISOString().split('T')[0];
    let allData = JSON.parse(localStorage.getItem('babyTrackerData')) || {};

    function updateDisplay() {
        document.getElementById('currentDateDisplay').innerText = currentDate;
        const rows = allData[currentDate] || [];
        const tbody = document.getElementById('gridBody');
        tbody.innerHTML = '';

        let fTotal = 0, uTotal = 0, vTotal = 0, sTotal = 0;

        rows.forEach((row, index) => {
            fTotal += parseFloat(row.formula || 0);
            uTotal += parseInt(row.urine || 0);
            vTotal += parseInt(row.vomit || 0);
            sTotal += parseInt(row.stool || 0);

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" value="${row.time}" onchange="updateCell(${index}, 'time', this.value)"></td>
                <td><input type="text" value="${row.breast}" onchange="updateCell(${index}, 'breast', this.value)"></td>
                <td><input type="number" value="${row.formula}" onchange="updateCell(${index}, 'formula', this.value)"></td>
                <td>
                    <div class="count-cell">
                        <button class="count-btn" onclick="adjustCount(${index}, 'urine', -1)">-</button>
                        <input type="number" class="count-input" value="${row.urine}" onchange="updateCell(${index}, 'urine', this.value)">
                        <button class="count-btn" onclick="adjustCount(${index}, 'urine', 1)">+</button>
                    </div>
                </td>
                <td>
                    <div class="count-cell">
                        <button class="count-btn" onclick="adjustCount(${index}, 'vomit', -1)">-</button>
                        <input type="number" class="count-input" value="${row.vomit}" onchange="updateCell(${index}, 'vomit', this.value)">
                        <button class="count-btn" onclick="adjustCount(${index}, 'vomit', 1)">+</button>
                    </div>
                </td>
                <td>
                    <div class="count-cell">
                        <button class="count-btn" onclick="adjustCount(${index}, 'stool', -1)">-</button>
                        <input type="number" class="count-input" value="${row.stool}" onchange="updateCell(${index}, 'stool', this.value)">
                        <button class="count-btn" onclick="adjustCount(${index}, 'stool', 1)">+</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('totalFormula').innerText = fTotal;
        document.getElementById('totalUrine').innerText = uTotal;
        document.getElementById('totalVomit').innerText = vTotal;
        document.getElementById('totalStool').innerText = sTotal;
    }

    function addRow() {
        if (!allData[currentDate]) allData[currentDate] = [];
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        allData[currentDate].push({ time: timeStr, breast: '', formula: 0, urine: 0, vomit: 0, stool: 0 });
        save();
    }

    function updateCell(index, field, value) {
        allData[currentDate][index][field] = value;
        save();
    }

    function adjustCount(index, field, amount) {
        let val = parseInt(allData[currentDate][index][field]) || 0;
        allData[currentDate][index][field] = Math.max(0, val + amount);
        save();
    }

    function changeDate(days) {
        let d = new Date(currentDate);
        d.setDate(d.getDate() + days);
        currentDate = d.toISOString().split('T')[0];
        updateDisplay();
    }

    function save() {
        localStorage.setItem('babyTrackerData', JSON.stringify(allData));
        updateDisplay();
    }

    function exportCSV() {
        const rows = allData[currentDate] || [];
        let csv = 'Time,Breastfeed,Formula (ml),Urine,Vomit,Stool\n';
        rows.forEach(r => {
            csv += `${r.time},${r.breast},${r.formula},${r.urine},${r.vomit},${r.stool}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', `baby-tracker-${currentDate}.csv`);
        a.click();
    }

    updateDisplay();
</script>

</body>
</html>
